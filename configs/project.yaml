project:
  name: ShadowGen-ML-training
  responsibility: training
  contract_variant: v2-diff

data:
  dataset_root_env: SHADOWGEN_DATASET_ROOT
  default_dataset_root: "\\\\riper\\datasets\\3D\\final_objaverse_v1"
  selected_dataset: final_objaverse_v1
  copy_raw_data_into_repo: false
  git_tracked_data: false
  available_ground_truth:
    - composite_with_shadow
    - object_mask
  target_extraction:
    initial_policy: non_object_pixels_from_composite
    requires_validation: true
  versioning:
    selected_tool: dvc
    initialized: false
    first_scope: processed_dataset_version
    s3_remote_now: false

model:
  family: stable_diffusion
  architecture: sd1.5
  product_direction: large_pretrained_diffusion_adaptation
  toy_baseline_required_for_pipeline_smoke: true
  hardware_targets:
    train_vram_gb: 24
    inference_vram_gb: 11
  output_policy:
    model_output: shadow_layer
    object_mask_region_policy: ignored_for_shadow_quality
    product_composition: overlay_original_object_on_model_output
    contract_note: model output is treated as shadow_layer; pixels inside object mask are not important because the original object is overlaid later
  candidates:
    - stable_diffusion_1_5
    - diffusion_backbone
    - lora
    - controlnet
    - control_lora_hybrid
  contract:
    stage_key: shadow_generator
    model_variant: v2-diff
    recommended_size: [512, 512]
    input_tensors:
      img: [N, 4, H, W]
      mask: [N, 1, H, W]
      depth: [N, 1, H, W]
      normal: [N, 3, H, W]
      angle: [N]
      elevation: [N]
      softness: [N]
      reflection: [N]
    output_tensors:
      shadow: [N, 4, H, W]

tracking:
  preferred: wandb
  wandb_enabled: false
  mlflow_enabled: false
  dvc_remote_configured: false

artifacts:
  commit_large_artifacts_to_git: false
  ignored_roots:
    - data/
    - datasets/
    - outputs/
    - runs/
    - checkpoints/
    - wandb/
    - mlruns/
